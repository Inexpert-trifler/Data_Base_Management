<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GroceryPro Products - Browse, add, and manage your grocery product inventory with real-time stock tracking.">
  <meta name="color-scheme" content="light">
  <title>Products | GroceryPro Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="app-wrapper">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-content">
      <header class="top-header" id="topHeader"></header>

      <div class="page-content">
        <!-- Stats -->
        <div class="row g-4 mb-4">
          <div class="col-xl-3 col-md-6">
            <div class="stat-card orange animate-in">
              <div class="stat-icon orange"><i class="fas fa-boxes-stacked"></i></div>
              <div class="stat-value" id="statTotalProducts">0</div>
              <div class="stat-label">Total Products</div>
            </div>
          </div>
          <div class="col-xl-3 col-md-6">
            <div class="stat-card green animate-in animate-in-delay-1">
              <div class="stat-icon green"><i class="fas fa-tags"></i></div>
              <div class="stat-value" id="statCategories">0</div>
              <div class="stat-label">Categories</div>
            </div>
          </div>
          <div class="col-xl-3 col-md-6">
            <div class="stat-card indigo animate-in animate-in-delay-2">
              <div class="stat-icon indigo"><i class="fas fa-warehouse"></i></div>
              <div class="stat-value" id="statTotalStock">0</div>
              <div class="stat-label">Total Stock Units</div>
            </div>
          </div>
          <div class="col-xl-3 col-md-6">
            <div class="stat-card purple animate-in animate-in-delay-3">
              <div class="stat-icon purple" style="background:rgba(239,68,68,0.12);color:var(--accent-red);"><i class="fas fa-exclamation-triangle"></i></div>
              <div class="stat-value" id="statLowStock">0</div>
              <div class="stat-label">Low Stock Items</div>
            </div>
          </div>
        </div>

        <!-- Products Table -->
        <div class="data-card animate-in animate-in-delay-3">
          <div class="data-card-header">
            <h6><i class="fas fa-boxes"></i> Product Inventory</h6>
            <button class="btn-primary-custom" onclick="openAddProductModal()">
              <i class="fas fa-plus"></i> Add Product
            </button>
          </div>
          <div class="data-card-body">
            <div class="toolbar">
              <div class="toolbar-left">
                <div class="toolbar-search">
                  <i class="fas fa-search"></i>
                  <input type="text" placeholder="Search products..." id="searchProducts" oninput="renderProducts()">
                </div>
                <div class="toolbar-filter">
                  <select id="filterCategory" onchange="renderProducts()">
                    <option value="">All Categories</option>
                  </select>
                </div>
                <div class="toolbar-filter">
                  <select id="filterStock" onchange="renderProducts()">
                    <option value="">All Stock Levels</option>
                    <option value="low">Low Stock (&lt;50)</option>
                    <option value="medium">Medium (50-200)</option>
                    <option value="high">High Stock (&gt;200)</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="row g-4" id="productsGrid"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Product Modal -->
  <div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fas fa-box"></i> <span id="productModalTitle">Add Product</span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="productId">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label-custom">Product Name</label>
              <input type="text" class="form-control-custom" id="productName" placeholder="Enter product name">
            </div>
            <div class="col-md-6">
              <label class="form-label-custom">SKU Code</label>
              <input type="text" class="form-control-custom" id="productSku" placeholder="e.g., FRT-001">
            </div>
            <div class="col-md-4">
              <label class="form-label-custom">Category</label>
              <select class="form-control-custom" id="productCategory"></select>
            </div>
            <div class="col-md-4">
              <label class="form-label-custom">Price (₹)</label>
              <input type="number" class="form-control-custom" id="productPrice" placeholder="Enter price" min="0">
            </div>
            <div class="col-md-4">
              <label class="form-label-custom">Stock Quantity</label>
              <input type="number" class="form-control-custom" id="productStock" placeholder="Enter stock" min="0">
            </div>
            <div class="col-md-6">
              <label class="form-label-custom">Unit</label>
              <input type="text" class="form-control-custom" id="productUnit" placeholder="e.g., kg, packet, dozen">
            </div>
            <div class="col-md-6">
              <label class="form-label-custom">Supplier</label>
              <input type="text" class="form-control-custom" id="productSupplier" placeholder="Enter supplier name">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary-custom" data-bs-dismiss="modal">Cancel</button>
          <button class="btn-primary-custom" onclick="saveProduct()"><i class="fas fa-save"></i> Save Product</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-body">
          <div class="delete-confirm-body">
            <div class="delete-icon"><i class="fas fa-trash-alt"></i></div>
            <h5>Delete Product?</h5>
            <p>This will permanently remove this product from inventory.</p>
          </div>
        </div>
        <div class="modal-footer justify-content-center">
          <button class="btn-secondary-custom" data-bs-dismiss="modal">Cancel</button>
          <button class="btn-danger-custom" id="confirmDeleteBtn"><i class="fas fa-trash"></i> Delete</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/products.js"></script>
</body>
</html>

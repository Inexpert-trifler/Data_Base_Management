<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GroceryPro Payments - Monitor all payment transactions, track refunds, and manage payment methods.">
  <meta name="color-scheme" content="light">
  <title>Payments | GroceryPro Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="app-wrapper">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-content">
      <header class="top-header" id="topHeader"></header>

      <div class="page-content">
        <!-- Stats -->
        <div class="row g-4 mb-4">
          <div class="col-xl-3 col-md-6">
            <div class="stat-card green animate-in">
              <div class="stat-icon green"><i class="fas fa-indian-rupee-sign"></i></div>
              <div class="stat-value" id="statTotalPayments">₹0</div>
              <div class="stat-label">Total Collected</div>
            </div>
          </div>
          <div class="col-xl-3 col-md-6">
            <div class="stat-card indigo animate-in animate-in-delay-1">
              <div class="stat-icon indigo"><i class="fas fa-check-circle"></i></div>
              <div class="stat-value" id="statCompleted">0</div>
              <div class="stat-label">Completed</div>
            </div>
          </div>
          <div class="col-xl-3 col-md-6">
            <div class="stat-card orange animate-in animate-in-delay-2">
              <div class="stat-icon orange"><i class="fas fa-hourglass-half"></i></div>
              <div class="stat-value" id="statPendingPayments">0</div>
              <div class="stat-label">Pending</div>
            </div>
          </div>
          <div class="col-xl-3 col-md-6">
            <div class="stat-card purple animate-in animate-in-delay-3">
              <div class="stat-icon purple"><i class="fas fa-undo"></i></div>
              <div class="stat-value" id="statRefunded">0</div>
              <div class="stat-label">Refunded</div>
            </div>
          </div>
        </div>

        <!-- Payments Table -->
        <div class="data-card animate-in animate-in-delay-3">
          <div class="data-card-header">
            <h6><i class="fas fa-credit-card"></i> Payment Transactions</h6>
            <button class="btn-primary-custom" onclick="openAddPaymentModal()">
              <i class="fas fa-plus"></i> Record Payment
            </button>
          </div>
          <div class="data-card-body">
            <div class="toolbar">
              <div class="toolbar-left">
                <div class="toolbar-search">
                  <i class="fas fa-search"></i>
                  <input type="text" placeholder="Search payments..." id="searchPayments" oninput="renderPayments()">
                </div>
                <div class="toolbar-filter">
                  <select id="filterPayStatus" onchange="renderPayments()">
                    <option value="">All Status</option>
                    <option value="completed">Completed</option>
                    <option value="pending">Pending</option>
                    <option value="refunded">Refunded</option>
                  </select>
                </div>
                <div class="toolbar-filter">
                  <select id="filterPayMethod" onchange="renderPayments()">
                    <option value="">All Methods</option>
                    <option value="Cash">Cash</option>
                    <option value="Credit Card">Credit Card</option>
                    <option value="Debit Card">Debit Card</option>
                    <option value="UPI">UPI</option>
                    <option value="Net Banking">Net Banking</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="table-responsive">
              <table class="table-custom">
                <thead>
                  <tr>
                    <th>Payment ID</th>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Amount</th>
                    <th>Method</th>
                    <th>Date</th>
                    <th>Transaction ID</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="paymentsTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Payment Modal -->
  <div class="modal fade" id="paymentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fas fa-credit-card"></i> <span id="paymentModalTitle">Record Payment</span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="paymentEditId">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label-custom">Order ID</label>
              <select class="form-control-custom" id="paymentOrderId"></select>
            </div>
            <div class="col-md-6">
              <label class="form-label-custom">Amount (₹)</label>
              <input type="number" class="form-control-custom" id="paymentAmount" placeholder="Enter amount" min="0">
            </div>
            <div class="col-md-6">
              <label class="form-label-custom">Payment Method</label>
              <select class="form-control-custom" id="paymentMethod">
                <option value="Cash">Cash</option>
                <option value="Credit Card">Credit Card</option>
                <option value="Debit Card">Debit Card</option>
                <option value="UPI">UPI</option>
                <option value="Net Banking">Net Banking</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label-custom">Date</label>
              <input type="date" class="form-control-custom" id="paymentDate">
            </div>
            <div class="col-md-6">
              <label class="form-label-custom">Transaction ID</label>
              <input type="text" class="form-control-custom" id="paymentTxnId" placeholder="e.g., TXN12345678">
            </div>
            <div class="col-md-6">
              <label class="form-label-custom">Status</label>
              <select class="form-control-custom" id="paymentStatus">
                <option value="completed">Completed</option>
                <option value="pending">Pending</option>
                <option value="refunded">Refunded</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary-custom" data-bs-dismiss="modal">Cancel</button>
          <button class="btn-primary-custom" onclick="savePayment()"><i class="fas fa-save"></i> Save Payment</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-body">
          <div class="delete-confirm-body">
            <div class="delete-icon"><i class="fas fa-trash-alt"></i></div>
            <h5>Delete Payment?</h5>
            <p>This payment record will be permanently removed.</p>
          </div>
        </div>
        <div class="modal-footer justify-content-center">
          <button class="btn-secondary-custom" data-bs-dismiss="modal">Cancel</button>
          <button class="btn-danger-custom" id="confirmDeleteBtn"><i class="fas fa-trash"></i> Delete</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/payments.js"></script>
</body>
</html>

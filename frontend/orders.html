<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GroceryPro Orders - Track and manage all customer orders with real-time status updates.">
  <meta name="color-scheme" content="light">
  <title>Orders | GroceryPro Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="app-wrapper">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-content">
      <header class="top-header" id="topHeader"></header>

      <div class="page-content">
        <!-- Stats -->
        <div class="row g-4 mb-4">
          <div class="col-xl-3 col-md-6">
            <div class="stat-card indigo animate-in">
              <div class="stat-icon indigo"><i class="fas fa-shopping-cart"></i></div>
              <div class="stat-value" id="statTotalOrders">0</div>
              <div class="stat-label">Total Orders</div>
            </div>
          </div>
          <div class="col-xl-3 col-md-6">
            <div class="stat-card green animate-in animate-in-delay-1">
              <div class="stat-icon green"><i class="fas fa-check-double"></i></div>
              <div class="stat-value" id="statDelivered">0</div>
              <div class="stat-label">Delivered</div>
            </div>
          </div>
          <div class="col-xl-3 col-md-6">
            <div class="stat-card orange animate-in animate-in-delay-2">
              <div class="stat-icon orange"><i class="fas fa-clock"></i></div>
              <div class="stat-value" id="statPendingOrders">0</div>
              <div class="stat-label">Pending / Processing</div>
            </div>
          </div>
          <div class="col-xl-3 col-md-6">
            <div class="stat-card blue animate-in animate-in-delay-3">
              <div class="stat-icon blue"><i class="fas fa-indian-rupee-sign"></i></div>
              <div class="stat-value" id="statOrderRevenue">₹0</div>
              <div class="stat-label">Total Revenue</div>
            </div>
          </div>
        </div>

        <!-- Orders Table -->
        <div class="data-card animate-in animate-in-delay-3">
          <div class="data-card-header">
            <h6><i class="fas fa-shopping-cart"></i> Order Management</h6>
            <button class="btn-primary-custom" onclick="openAddOrderModal()">
              <i class="fas fa-plus"></i> New Order
            </button>
          </div>
          <div class="data-card-body">
            <div class="toolbar">
              <div class="toolbar-left">
                <div class="toolbar-search">
                  <i class="fas fa-search"></i>
                  <input type="text" placeholder="Search orders..." id="searchOrders" oninput="renderOrders()">
                </div>
                <div class="toolbar-filter">
                  <select id="filterOrderStatus" onchange="renderOrders()">
                    <option value="">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="processing">Processing</option>
                    <option value="shipped">Shipped</option>
                    <option value="delivered">Delivered</option>
                    <option value="cancelled">Cancelled</option>
                  </select>
                </div>
                <div class="toolbar-filter">
                  <select id="filterPaymentStatus" onchange="renderOrders()">
                    <option value="">All Payment Status</option>
                    <option value="paid">Paid</option>
                    <option value="pending">Pending</option>
                    <option value="refunded">Refunded</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="table-responsive">
              <table class="table-custom">
                <thead>
                  <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Date</th>
                    <th>Items</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Payment</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="ordersTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Order Modal -->
  <div class="modal fade" id="orderModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fas fa-shopping-cart"></i> <span id="orderModalTitle">New Order</span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="orderEditId">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label-custom">Customer</label>
              <select class="form-control-custom" id="orderCustomer"></select>
            </div>
            <div class="col-md-6">
              <label class="form-label-custom">Order Date</label>
              <input type="date" class="form-control-custom" id="orderDate">
            </div>
            <div class="col-12">
              <label class="form-label-custom">Items (comma separated)</label>
              <input type="text" class="form-control-custom" id="orderItems" placeholder="e.g., Organic Bananas x2, Amul Milk x3">
            </div>
            <div class="col-md-4">
              <label class="form-label-custom">Total Amount (₹)</label>
              <input type="number" class="form-control-custom" id="orderTotal" placeholder="Enter total" min="0">
            </div>
            <div class="col-md-4">
              <label class="form-label-custom">Order Status</label>
              <select class="form-control-custom" id="orderStatus">
                <option value="pending">Pending</option>
                <option value="processing">Processing</option>
                <option value="shipped">Shipped</option>
                <option value="delivered">Delivered</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label-custom">Payment Status</label>
              <select class="form-control-custom" id="orderPaymentStatus">
                <option value="pending">Pending</option>
                <option value="paid">Paid</option>
                <option value="refunded">Refunded</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary-custom" data-bs-dismiss="modal">Cancel</button>
          <button class="btn-primary-custom" onclick="saveOrder()"><i class="fas fa-save"></i> Save Order</button>
        </div>
      </div>
    </div>
  </div>

  <!-- View Order Modal -->
  <div class="modal fade" id="viewOrderModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fas fa-eye"></i> Order Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="viewOrderBody"></div>
        <div class="modal-footer">
          <button class="btn-secondary-custom" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-body">
          <div class="delete-confirm-body">
            <div class="delete-icon"><i class="fas fa-trash-alt"></i></div>
            <h5>Delete Order?</h5>
            <p>This action cannot be undone.</p>
          </div>
        </div>
        <div class="modal-footer justify-content-center">
          <button class="btn-secondary-custom" data-bs-dismiss="modal">Cancel</button>
          <button class="btn-danger-custom" id="confirmDeleteBtn"><i class="fas fa-trash"></i> Delete</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/orders.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GroceryPro Customers - Manage customer records, view purchase history, and track customer status.">
  <meta name="color-scheme" content="light">
  <title>Customers | GroceryPro Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="app-wrapper">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-content">
      <header class="top-header" id="topHeader"></header>

      <div class="page-content">
        <!-- Stats -->
        <div class="row g-4 mb-4">
          <div class="col-xl-3 col-md-6">
            <div class="stat-card blue animate-in">
              <div class="stat-icon blue"><i class="fas fa-users"></i></div>
              <div class="stat-value" id="statTotal">0</div>
              <div class="stat-label">Total Customers</div>
            </div>
          </div>
          <div class="col-xl-3 col-md-6">
            <div class="stat-card green animate-in animate-in-delay-1">
              <div class="stat-icon green"><i class="fas fa-user-check"></i></div>
              <div class="stat-value" id="statActive">0</div>
              <div class="stat-label">Active Customers</div>
            </div>
          </div>
          <div class="col-xl-3 col-md-6">
            <div class="stat-card purple animate-in animate-in-delay-2">
              <div class="stat-icon purple"><i class="fas fa-indian-rupee-sign"></i></div>
              <div class="stat-value" id="statSpent">₹0</div>
              <div class="stat-label">Total Revenue</div>
            </div>
          </div>
          <div class="col-xl-3 col-md-6">
            <div class="stat-card orange animate-in animate-in-delay-3">
              <div class="stat-icon orange"><i class="fas fa-shopping-bag"></i></div>
              <div class="stat-value" id="statAvgOrders">0</div>
              <div class="stat-label">Avg. Orders/Customer</div>
            </div>
          </div>
        </div>

        <!-- Customers Table -->
        <div class="data-card animate-in animate-in-delay-3">
          <div class="data-card-header">
            <h6><i class="fas fa-users"></i> Customer Directory</h6>
            <button class="btn-primary-custom" onclick="openAddCustomerModal()">
              <i class="fas fa-plus"></i> Add Customer
            </button>
          </div>
          <div class="data-card-body">
            <div class="toolbar">
              <div class="toolbar-left">
                <div class="toolbar-search">
                  <i class="fas fa-search"></i>
                  <input type="text" placeholder="Search customers..." id="searchCustomers" oninput="renderCustomers()">
                </div>
                <div class="toolbar-filter">
                  <select id="filterStatus" onchange="renderCustomers()">
                    <option value="">All Status</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="table-responsive">
              <table class="table-custom">
                <thead>
                  <tr>
                    <th>Customer</th>
                    <th>Phone</th>
                    <th>Address</th>
                    <th>Joined</th>
                    <th>Orders</th>
                    <th>Total Spent</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="customersTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Customer Modal -->
  <div class="modal fade" id="customerModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fas fa-user-plus"></i> <span id="customerModalTitle">Add Customer</span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="customerId">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label-custom">Full Name</label>
              <input type="text" class="form-control-custom" id="customerName" placeholder="Enter full name">
            </div>
            <div class="col-md-6">
              <label class="form-label-custom">Email</label>
              <input type="email" class="form-control-custom" id="customerEmail" placeholder="Enter email address">
            </div>
            <div class="col-md-6">
              <label class="form-label-custom">Phone</label>
              <input type="text" class="form-control-custom" id="customerPhone" placeholder="Enter phone number">
            </div>
            <div class="col-md-6">
              <label class="form-label-custom">Status</label>
              <select class="form-control-custom" id="customerStatus">
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label-custom">Address</label>
              <input type="text" class="form-control-custom" id="customerAddress" placeholder="Enter address">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary-custom" data-bs-dismiss="modal">Cancel</button>
          <button class="btn-primary-custom" onclick="saveCustomer()"><i class="fas fa-save"></i> Save Customer</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-body">
          <div class="delete-confirm-body">
            <div class="delete-icon"><i class="fas fa-trash-alt"></i></div>
            <h5>Delete Customer?</h5>
            <p>This action cannot be undone. All associated data will be permanently removed.</p>
          </div>
        </div>
        <div class="modal-footer justify-content-center">
          <button class="btn-secondary-custom" data-bs-dismiss="modal">Cancel</button>
          <button class="btn-danger-custom" id="confirmDeleteBtn"><i class="fas fa-trash"></i> Delete</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/customers.js"></script>
</body>
</html>
